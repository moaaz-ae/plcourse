- type: truth-table
  question: 'Test validity: $P \to Q$, $P$ $\therefore$ $Q$. Complete the $(P \to Q)$ column.'
  formulas:
    - $P$
    - $Q$
    - '$(P \to Q)$'
  hiddenFormulas:
    - '$(P \to Q)$'
  hint: 'Check for a bad row: all premises true, conclusion false.'
  walkthrough: >
    1. Row 1: T$\to$T=T. Row 2: T$\to$F=F.

    2. Row 3: F$\to$T=T. Row 4: F$\to$F=T.

    3. Check bad rows: Row 1 both premises T, conclusion T (not bad). Row 2 premise 1 F (not bad). Rows 3-4 premise 2 F
    (not bad).

    4. No bad row. The argument is valid.
  tags:
    - test-validity-truth-table

- type: mcq
  question: 'What is a "bad row" in a joint truth table?'
  answer: 2
  options:
    - A row where all formulas are false
    - A row where all premises are true and the conclusion is false
    - A row where the conclusion is true
    - Any row where a premise is false
  hint: 'A bad row shows the argument fails: premises hold but the conclusion does not.'
  walkthrough: |
    1. A bad row has all premises true simultaneously with a false conclusion.
    2. One bad row proves the argument is invalid.
    3. No bad rows means the argument is valid.
    4. A bad row is a row where all premises are true and the conclusion is false.
  tags:
    - test-validity-truth-table

- type: mcq
  question: 'Argument: $P \to Q$, $Q$ $\therefore$ $P$. Row 3 has $P$=F, $Q$=T. Is this a bad row?'
  answer: 1
  options:
    - 'Yes; $P \to Q$=T, $Q$=T (both premises true), but $P$=F (conclusion false)'
    - No; $P$ being false means the premise fails
    - No; $Q$ being true means the conclusion is true
    - Yes; but only if there are no other bad rows
  hint: Check each premise and the conclusion on this row.
  walkthrough: |
    1. Premise 1: $P \to Q$ = F$\to$T = T. Premise 2: $Q$ = T. Both true.
    2. Conclusion: $P$ = F.
    3. All premises true, conclusion false: this is a bad row.
    4. Both premises are true and the conclusion is false, so this is a bad row.
  tags:
    - test-validity-truth-table

- type: assertion-judgment
  question: Is this argument valid?
  answer: Valid
  premises:
    - '$P \to Q$'
    - '$\neg Q$'
  conclusion: '$\neg P$'
  isValid: true
  hint: Check all 4 rows. Can you find a bad row?
  walkthrough: |
    1. Row 1 (T,T): $\neg Q$=F. Premise 2 false. Not bad.
    2. Row 2 (T,F): $P \to Q$=F. Premise 1 false. Not bad.
    3. Row 3 (F,T): $\neg Q$=F. Premise 2 false. Not bad.
    4. Row 4 (F,F): $P \to Q$=T, $\neg Q$=T. Conclusion $\neg P$=T. Not bad.
    5. No bad row exists. The argument is **valid**.
  tags:
    - test-validity-truth-table

- type: assertion-judgment
  question: Is this argument valid?
  answer: Invalid
  premises:
    - '$P \lor Q$'
    - $P$
  conclusion: '$\neg Q$'
  isValid: false
  counterexample:
    P: true
    Q: true
  hint: 'Try $P$=T, $Q$=T.'
  walkthrough: |
    1. Set $P$=T, $Q$=T.
    2. Premise 1: $P \lor Q$ = T. Premise 2: $P$ = T. Both true.
    3. Conclusion: $\neg Q$ = F.
    4. All premises true, conclusion false.
    5. This counterexample proves the argument is **invalid**.
  tags:

- type: assertion-judgment
  question: Is this argument valid?
  answer: Valid
  premises:
    - '$\neg P \to Q$'
    - '$\neg Q$'
  conclusion: $P$
  isValid: true
  hint: 'This is Modus Tollens applied to $\neg P \to Q$.'
  walkthrough: |
    1. Both premises true requires $\neg P \to Q$=T and $\neg Q$=T (so $Q$=F).
    2. $\neg P \to Q$=T with $Q$=F means $\neg P$ must be F (otherwise F$\to$F would still be T; check: if $\neg P$=T then $Q$ must be T, contradiction).
    3. Wait: $\neg P$=T and $Q$=F gives $\neg P \to Q$=T$\to$F=F. So premise 1 is false. Not a bad row.
    4. $\neg P$=F means $P$=T. Conclusion $P$=T. Not bad.
    5. No bad row. The argument is **valid**.
  tags:

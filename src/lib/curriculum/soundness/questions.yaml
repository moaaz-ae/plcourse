  answer: 3
  options:
    - 'Bad premise (unsound): premise 1 is false'
    - The argument is sound
    - 'Bad structure (invalid): notebooks and magazines also have pages'
    - 'Bad premise (unsound): premise 2 is false'
  hint: Can something have pages without being a book?
  walkthrough: |
    1. Notebooks, magazines, and calendars all have pages but are not books.
    2. Both premises can be true while the conclusion is false.
    3. The argument affirms the consequent: invalid.
    4. The argument fails because of bad structure (invalid): notebooks and magazines also have pages.
  tags:
    - diagnose-failure

- type: mcq
  question: An argument fails because the conclusion is completely unrelated to the premises. Which diagnosis applies?
  answer: 2
  options:
    - Bad premise (unsound)
    - Bad structure (invalid)
    - Both bad structure and bad premise
    - The argument does not fail
  hint: 'If the conclusion does not follow from the premises, the structure is the problem.'
  walkthrough: |
    1. When the conclusion is unrelated to the premises, the premises can be true while the conclusion is false.
    2. This means the argument is invalid.
    3. The failure is in the structure, not the premises.
    4. The diagnosis is bad structure (invalid).
  tags:
    - diagnose-failure

- type: mcq
  question: Does soundness guarantee that the conclusion cannot be false?
  answer: 3
  options:
    - No; only validity matters for the conclusion
    - No; the conclusion might still be false
    - Yes; soundness makes it impossible for the conclusion to be false
    - Only if the argument has exactly two premises
  hint: 'Sound = valid + all true premises. Can the conclusion escape being true?'
  walkthrough: |
    1. Validity ensures: if premises are true, the conclusion must be true.
    2. Soundness ensures: premises are actually true.
    3. Together, the conclusion cannot be false.
    4. Yes: soundness makes it impossible for the conclusion to be false.
  tags:
    - sound-true-conclusion

- type: mcq
  question: 'Which argument is valid but unsound? 1. All deserts are cold. 2. The Sahara is a desert. 3. Therefore, the Sahara is cold.'
  answer: 4
  options:
    - Valid and sound
    - Invalid and unsound
    - Valid but unsound; premise 2 is false
    - Valid but unsound; premise 1 is false (many deserts are hot)
  hint: Are all deserts cold?
  walkthrough: |
    1. Validity: if all deserts were cold and the Sahara is a desert, the Sahara would be cold. Valid.
    2. Premise 1: all deserts are cold. False; many deserts, including the Sahara, are hot.
    3. Premise 2: the Sahara is a desert. True.
    4. The argument is valid but unsound because premise 1 is false.
  tags:
    - valid-unsound

- type: mcq
  question: 'Which premise is false? 1. All rivers flow into the ocean. 2. The Nile is a river. 3. Therefore, the Nile flows into the ocean.'
  answer: 1
  options:
    - Premise 1 (some rivers flow into lakes or dry up)
    - Premise 2
    - Both premises
    - Neither; the argument is sound
  hint: Do all rivers flow into the ocean? Consider rivers that end in lakes or evaporate.
  walkthrough: |
    1. Premise 1: all rivers flow into the ocean. False; some rivers flow into lakes or evaporate in deserts.
    2. Premise 2: the Nile is a river. True.
    3. The false premise is premise 1.
  tags:
    - valid-unsound

- type: mcq
  question: 'To show $(P \to Q) \land (Q \to R)$ is NOT a tautology, you need:'
  answer: 3
  options:
    - A complete truth table showing all rows
    - Two rows where it is false
    - One row where the formula is false
    - A proof that it is a contradiction
  hint: 'One counterexample is enough to disprove "always true."'
  walkthrough: |
    1. A tautology is true on every row.
    2. One row where the formula is false disproves this.
    3. A single counterexample suffices.
    4. One row where the formula is false is enough.
  tags:
    - partial-table-single

- type: mcq
  question: 'Find a valuation that makes $(P \land Q) \to R$ false.'
  answer: 2
  options:
    - '$P$=T, $Q$=F, $R$=F'
    - '$P$=T, $Q$=T, $R$=F'
    - '$P$=F, $Q$=F, $R$=F'
    - '$P$=T, $Q$=T, $R$=T'
  hint: A conditional is false only when the antecedent is true and consequent is false.
  walkthrough: |
    1. The main operator is $\to$. It is false when antecedent=T and consequent=F.
    2. Antecedent $(P \land Q)$=T requires $P$=T and $Q$=T.
    3. Consequent $R$=F.
    4. Check: (T$\land$T)$\to$F = T$\to$F = F.
    5. The correct valuation is $P$=T, $Q$=T, $R$=F.
  tags:
    - partial-table-single

- type: mcq
  question: 'To show $(P \lor Q)$ is NOT a contradiction, you need:'
  answer: 1
  options:

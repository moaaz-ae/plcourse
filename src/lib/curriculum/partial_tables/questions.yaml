    - A row where they have different truth values
  hint: Equivalence fails when the formulas differ on at least one row.
  walkthrough: |
    1. Equivalence means matching on every row.
    2. One row where they differ breaks equivalence.
    3. Try $P$=T, $Q$=F: $P \to Q$=F, $Q \to P$=T. They differ.
    4. A row where they have different truth values disproves equivalence.
  tags:
    - partial-table-single

- type: mcq
  question: When should you use a complete truth table instead of a partial one?
  answer: 3
  options:

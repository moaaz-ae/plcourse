    - To prove an argument is valid
    - 'To find a single row that disproves a claim (e.g., invalidity, non-tautology)'
  hint: 'Partial tables find one counterexample, not a universal proof.'
  walkthrough: |
    1. A partial truth table constructs one row to answer a specific question.
    2. It can show invalidity (one bad row), non-tautology (one false row), etc.
    3. It cannot prove universal claims (validity, tautology) that require all rows.

    - When proving an argument is invalid
    - When proving a formula IS a tautology (true on every row)
    - When proving a set is satisfiable
  hint: 'Partial tables show one row. Proving "for all rows" requires checking all rows.'
  walkthrough: |
    1. A partial table finds one example; it cannot prove "for all rows."
    2. Proving a tautology requires confirming every row is T.
    3. Only a complete truth table can do this.
    4. A complete truth table is needed to prove a formula is a tautology.
  tags:
    - partial-table-single

- type: mcq
  question: 'To prove $P \to Q$, $Q$ $\therefore$ $P$ is invalid, work backward. Set the conclusion $P$=F. What must $Q$ be?'

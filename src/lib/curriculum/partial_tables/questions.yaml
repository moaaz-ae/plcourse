  walkthrough: |
    1. Start: $P$=F (conclusion false).
    2. Premise 2 is $Q$. For it to be true, $Q$=T.
    3. Check premise 1: $P \to Q$ = F$\to$T = T.
    4. Both premises true, conclusion false. Bad row found.
    5. $Q$=T is needed to make premise 2 true.
  tags:
    - partial-table-invalidity

- type: mcq
  question: 'To prove $A \to B$, $A \to C$ $\therefore$ $B \to C$ is invalid, which assignment works?'

    - All rows where it is true
    - A proof that it is a tautology
    - Two rows where it is true
  hint: A contradiction is false on every row. One true row disproves this.
  walkthrough: |
    1. A contradiction is false on every row.
    2. Finding one row where the formula is true proves it is not a contradiction.
    3. Try $P$=T, $Q$=F: T$\lor$F = T. Done.
    4. One row where the formula is true is enough.
  tags:
    - partial-table-single

- type: mcq
  question: 'To show $P \to Q$ and $Q \to P$ are NOT equivalent, you need:'
  answer: 4

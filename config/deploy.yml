<% require "dotenv"; Dotenv.load(".env.production") %>

service: plcourse

builder:
  arch: amd64

image: moaaz-ae/plcourse

deploy_timeout: 90

servers:
  web:
    - <%= ENV["SERVER_IP"] %>

ssh:
  user: deploy

proxy:
  ssl: true
  host: plcourse.moaaza.com
  app_port: 3000
  healthcheck:
    path: /up

registry:
  server: ghcr.io
  username: moaaz-ae
  password:
    - GITHUB_TOKEN

secrets_path: .env.production

env:
  clear:
    POSTGRES_HOST: plcourse-db
    POSTGRES_PORT: 5432
    POSTGRES_USER: postgres
    POSTGRES_DB: plcourse_db
  secret:
    - APP_URL
    - 'ORIGIN:APP_URL'
    - POSTGRES_PASSWORD
    - BETTER_AUTH_SECRET
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET

accessories:
  db:
    image: 'postgres:17-bookworm'
    host: <%= ENV["SERVER_IP"] %>
    port: '127.0.0.1:5432:5432'
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: plcourse_db
      secret:
        - POSTGRES_PASSWORD
    files:
      - 'db/init.sql:/docker-entrypoint-initdb.d/init.sql'
    directories:
      - 'data:/var/lib/postgresql/data'

  umami:
    image: 'ghcr.io/umami-software/umami:postgresql-latest'
    host: <%= ENV["SERVER_IP"] %>
    port: '3001:3000'
    env:
      clear:
        DATABASE_TYPE: postgresql
      secret:
        - 'DATABASE_URL:UMAMI_DATABASE_URL'
        - POSTGRES_PASSWORD
        - 'UMAMI_APP_SECRET:UMAMI_APP_SECRET'
    proxy:
      ssl: true
      host: analytics.moaaza.com
      app_port: 3000
      healthcheck:
        path: /

aliases:
  console: 'app exec --interactive --reuse "bash"'
  logs: app logs --follow
  db-migrate: 'app exec "./node_modules/.bin/kysely migrate latest"'
  db-seed: 'app exec "./node_modules/.bin/tsx src/lib/scripts/sync-curriculum.ts"'
